<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage Marçal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a0027 0%, #000000 55%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .stars span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #ffffff;
      border-radius: 50%;
      animation: snowfall 12s linear infinite;
      opacity: 0.7;
    }

    @keyframes snowfall {
      from {
        transform: translateY(-120px);
        opacity: 0;
      }

      15% {
        opacity: 0.9;
      }

      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    .container {
      width: 92%;
      max-width: 420px;
      text-align: center;
      z-index: 1;
      padding: 30px 0;
    }

    .logo-img {
      width: 100%;
      max-width: 360px;
      filter: drop-shadow(0 0 34px rgba(255,255,255,1));
      margin-bottom: 25px;
    }

    .info {
      margin-bottom: 30px;
      padding: 0 10px;
    }

    .info p {
      margin: 8px 0;
      font-size: 17px;
      color: #f1f1f1;
    }

    .highlight {
      font-weight: 600;
      color: white;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      background: rgba(18, 18, 18, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.28);
      padding: 18px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 700;
      transition: 0.25s ease;
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.14);
      position: relative;
    }

    .btn:hover {
      transform: scale(1.03);
      border-color: #ffffff;
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.35);
    }

    .icon-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      position: absolute;
      left: 18px;
      opacity: 0.95;
    }

    .footer {
      margin-top: 35px;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="stars">
  <span style="left:10%; top:90%; animation-delay:0s"></span>
  <span style="left:25%; top:70%; animation-delay:2s"></span>
  <span style="left:40%; top:95%; animation-delay:4s"></span>
  <span style="left:60%; top:85%; animation-delay:1s"></span>
  <span style="left:80%; top:75%; animation-delay:3s"></span>
  <span style="left:50%; top:65%; animation-delay:5s"></span>
  <span style="left:15%; top:55%; animation-delay:2s"></span>
  <span style="left:75%; top:60%; animation-delay:6s"></span>
  <span style="left:90%; top:92%; animation-delay:1s"></span>
  <span style="left:8%; top:4%; animation-delay:3s"></span>
  <span style="left:18%; top:12%; animation-delay:6s"></span>
  <span style="left:28%; top:2%; animation-delay:1s"></span>
  <span style="left:38%; top:18%; animation-delay:4s"></span>
  <span style="left:48%; top:7%; animation-delay:8s"></span>
  <span style="left:58%; top:16%; animation-delay:5s"></span>
  <span style="left:68%; top:3%; animation-delay:2s"></span>
  <span style="left:78%; top:14%; animation-delay:7s"></span>
  <span style="left:88%; top:6%; animation-delay:3s"></span>
  <span style="left:96%; top:20%; animation-delay:6s"></span>
</div>

<div class="container">

  <img src="https://i.imgur.com/7xJ6UIE.png" alt="Garage Marcal Logo" class="logo-img">

  <div class="info">
    <p class="highlight">▸ Audi A3 Sportback ◂</p>
    <p>🚀 Projetos e modificações para seu Audi.</p>
  </div>

  <div class="buttons">

    <a class="btn" href="https://wa.me/5531991355271" target="_blank">
      <img class="icon-img" src="https://cdn.simpleicons.org/whatsapp/white" alt="WhatsApp">
      Parcerias via WhatsApp
    </a>

    <a class="btn" href="https://instagram.com/garagemarcal" target="_blank">
      <img class="icon-img" src="https://cdn.simpleicons.org/instagram/white" alt="Instagram">
      Confira nosso Instagram
    </a>

    <div class="btn" style="cursor: default; opacity: 0.8;">
      <img class="icon-img" src="https://cdn.simpleicons.org/youtube/white" alt="YouTube">
      AGUARDE
    </div>

    <div class="btn" style="cursor: default; opacity: 0.8;">
      <img class="icon-img" src="https://cdn.simpleicons.org/tiktok/white" alt="TikTok">
      AGUARDE
    </div>

  </div>

  <div class="footer">
    © 2026 GARAGE MARCAL
  </div>

</div>

</body>
</html>
