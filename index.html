<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garage Marçal</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
min-height:100vh;
background:radial-gradient(circle at top,#180020 0%,#000000 50%);
color:white;
display:flex;
justify-content:center;
overflow:hidden;
position:relative;
}

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.stars span{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:.7;
animation:snow 12s linear infinite;
}

@keyframes snow{
from{
transform:translateY(-100px);
}
to{
transform:translateY(100vh);
}
}

.container{
width:92%;
max-width:380px;
text-align:center;
padding-top:20px;
z-index:1;
}

.logo-img{
width:100%;
max-width:260px;
filter:drop-shadow(0 0 30px rgba(255,255,255,1));
margin-bottom:18px;
}

.info p{
margin:6px;
font-size:14px;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
margin-top:18px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
position:relative;
text-decoration:none;
color:white;
background:rgba(15,15,15,.95);
border:2px solid rgba(255,255,255,.2);
padding:16px;
border-radius:18px;
font-weight:700;
font-size:16px;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
border-color:white;
}

.icon{
position:absolute;
left:18px;
width:20px;
height:20px;
object-fit:contain;
filter:brightness(0) invert(1);
}

.footer{
margin-top:20px;
color:rgba(255,255,255,.45);
font-size:12px;
}

</style>
</head>

<body>

<div class="stars">
<span style="left:5%;animation-delay:0s"></span>
<span style="left:15%;animation-delay:1s"></span>
<span style="left:25%;animation-delay:2s"></span>
<span style="left:35%;animation-delay:3s"></span>
<span style="left:45%;animation-delay:4s"></span>
<span style="left:55%;animation-delay:5s"></span>
<span style="left:65%;animation-delay:6s"></span>
<span style="left:75%;animation-delay:7s"></span>
<span style="left:85%;animation-delay:8s"></span>
<span style="left:95%;animation-delay:9s"></span>
</div>

<div class="container">

<img src="https://i.imgur.com/7xJ6UIE.png" class="logo-img">

<div class="info">
<p><b>▸ Audi A3 Sportback ◂</b></p>
<p>🚀 Projetos e modificações para seu Audi.</p>
</div>

<div class="buttons">

<a class="btn" href="https://wa.me/5531991355271" target="_blank">
<img class="icon" src="https://i.imgur.com/0vegyit.png">
Parcerias via WhatsApp
</a>

<a class="btn" href="https://instagram.com/garagemarcal" target="_blank">
<img class="icon" src="https://i.imgur.com/Cnl331z.png">
Confira nosso Instagram
</a>

<a class="btn" href="https://www.youtube.com/@richardmarcall" target="_blank">
<img class="icon" src="https://i.imgur.com/b9E2Dtf.png">
Canal no YouTube
</a>

<a class="btn" href="https://www.tiktok.com/@garagemarcal" target="_blank">
<img class="icon" src="https://i.imgur.com/moLocde.png">
Siga-nos no TikTok
</a>

</div>

<div class="footer">
© 2026 GARAGE MARCAL
</div>

</div>

</body>
</html>
